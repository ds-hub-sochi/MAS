experiment_name: arabic_finetune_from_pretrained
train_data: easyocr_data/train_d2  # Use the valid d2 dataset
valid_data: easyocr_data/val
select_data: /
batch_ratio: "1.0"
total_data_usage_ratio: 1.0
batch_size: 24
valInterval: 400
num_iter: 39500
saved_model: 'USER_HOME/.EasyOCR/model/arabic.pth'
FT: True
new_prediction: True
optim: adadelta
lr: 1.0

# Image parameters
imgH: 64
imgW: 640
rgb: False  # Grayscale
PAD: True

# Model architecture (MATCHES arabic_g1 = None-ResNet-BiLSTM-CTC)
Transformation: None
FeatureExtraction: ResNet
SequenceModeling: BiLSTM
Prediction: CTC
decode: 'greedy'
num_fiducial: 20
input_channel: 1
output_channel: 512
hidden_size: 512

# Characters
character: " !\"#$%&'()*+,-./0123456789:=?ABCDEFGHIJKLMNOPQRSTUVWXYZ[\\]_abcdefghijklmnopqrstuvwxyz|«º»ÁÃÈÉÊÑÓÚàáãçèéê،؛؟ءآأؤإئابةتثجحخدذرزسشصضطظعغـفقكلمنهوىئًٌٍَُِّْ٠١٢٣٤٥٦٧٨٩ٰپچڈژڤڨکگںھۀہۃیے۰۱۲۳۴۵۶۷۹–—’„•…●⸗ﭬﮋﱣ﴿ﷲ"

# Data processing
batch_max_length: 192  # Same as MMOCR
sensitive: True # Case sensitive (as extracted chars include uppercase)
data_filtering_off: True
workers: 4
