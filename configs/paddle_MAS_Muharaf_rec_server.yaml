Global:
  model_name: PP-OCRv5_server_rec
  debug: false
  use_gpu: true

  # Training schedule
  epoch_num: 100
  log_smooth_window: 20
  print_batch_step: 10

  # Output dirs
  save_model_dir: ./output/my_arabic_rec_server
  save_epoch_step: 10
  eval_batch_step: [0, 133]
  cal_metric_during_train: true

  # Server pretrained model (PPHGNetV2_B4 backbone)
  pretrained_model: ./pretrained/PP-OCRv5_server_rec_pretrained.pdparams
  checkpoints:
  save_inference_dir:

  use_visualdl: false
  infer_img:
  infer_mode: false

  # Character dictionary
  character_dict_path: /home/jovyan/people/murtazin/PaddleOCR/datasets/mas_anno/dict.txt
  use_space_char: true

  # Sequence length / shapes
  max_text_length: &max_text_length 192
  d2s_train_image_shape: [3, 48, 640]

  distributed: false
  save_res_path: ./output/rec/predicts_server.txt


Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: Cosine
    learning_rate: 0.0001
    warmup_epoch: 20
  regularizer:
    name: L2
    factor: 3.0e-05


Architecture:
  model_type: rec
  algorithm: SVTR_HGNet
  Transform:
  Backbone:
    name: PPHGNetV2_B4
    text_rec: True
  Head:
    name: MultiHead
    head_list:
      - CTCHead:
          Neck:
            name: svtr
            dims: 120
            depth: 2
            hidden_dims: 120
            kernel_size: [1, 3]
            use_guide: True
          Head:
            fc_decay: 0.00001
      - NRTRHead:
          nrtr_dim: 384
          max_text_length: *max_text_length


Loss:
  name: MultiLoss
  loss_config_list:
    - CTCLoss:
    - NRTRLoss:


PostProcess:
  name: CTCLabelDecode


Metric:
  name: RecMetric
  main_indicator: norm_edit_dis
  ignore_space: False


Train:
  dataset:
    name: MultiScaleDataSet
    ds_width: false
    data_dir: /
    ext_op_transform_idx: 0
    label_file_list:
      - /home/jovyan/people/murtazin/PaddleOCR/datasets/mas_anno/train_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      # - RecConAug:
      #     prob: 0.5
      #     ext_data_num: 2
      #     image_shape: [48, 320, 3]
      #     max_text_length: *max_text_length
      - RecAug:
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio

  sampler:
    name: MultiScaleSampler
    scales: [[640, 48]]
    first_bs: &bs 256  # Уменьшен для server модели (больше памяти)
    fix_bs: true
    divided_factor: [8, 16]
    is_training: True

  loader:
    shuffle: true
    batch_size_per_card: *bs
    drop_last: true
    num_workers: 16


Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /
    label_file_list:
      - /home/jovyan/people/murtazin/PaddleOCR/datasets/mas_anno/val_list.txt
    transforms:
      - DecodeImage:
          img_mode: BGR
          channel_first: false
      - MultiLabelEncode:
          gtc_encode: NRTRLabelEncode
      - RecResizeImg:
          image_shape: [3, 48, 640]
      - KeepKeys:
          keep_keys:
            - image
            - label_ctc
            - label_gtc
            - length
            - valid_ratio

  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 64
    num_workers: 4
